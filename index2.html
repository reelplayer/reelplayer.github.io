        :root {
            --primary-color: #4a6fff;
            --primary-dark: #3a5ce6;
            --primary-light: #6b8aff;
            --bg-dark: #0f0f0f;
            --bg-card: #1a1a1a;
            --bg-sidebar: #151515;
            --text-primary: #f0f0f0;
            --text-secondary: #a0a0a0;
            --border-color: #2a2a2a;
            --shadow-color: rgba(74, 111, 255, 0.15);
            --accent-color: #00d4ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            line-height: 1.6;
            display: flex;
            height: 100vh;
            overflow: hidden;
            font-weight: 400;
        }

        /* 左侧导航样式 */
        .sidebar {
            width: 280px;
            background: var(--bg-sidebar);
            height: 100vh;
            padding: 30px 0;
            overflow-y: auto;
            border-right: 1px solid var(--border-color);
            position: fixed;
            left: 0;
            top: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
        }

        .logo-container {
            padding: 0 25px 20px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 25px;
            text-align: center;
        }

        .logo {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 15px;
        }

        .logo-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
        }

        .logo-icon i {
            color: white;
            font-size: 22px;
        }

        .logo-text h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .logo-text p {
            font-size: 0.8rem;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
        }

        .language-switcher {
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .lang-link {
            color: var(--text-secondary);
            font-size: 0.75rem;
            text-decoration: none;
            padding: 5px 10px;
            border-radius: 4px;
            transition: all 0.2s ease;
        }

        .lang-link:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.05);
        }

        .lang-link.active {
            color: var(--primary-color);
            background: rgba(74, 111, 255, 0.1);
        }

        .nav-container {
            flex: 1;
            padding: 0 15px;
        }

        .nav-item {
            padding: 14px 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            border-radius: 8px;
            display: flex;
            align-items: center;
            font-weight: 500;
            margin-bottom: 6px;
            color: var(--text-secondary);
            position: relative;
        }

        .nav-item i {
            margin-right: 12px;
            font-size: 1.1rem;
            width: 20px;
            text-align: center;
            transition: transform 0.2s ease;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-primary);
        }

        .nav-item.active {
            background: rgba(74, 111, 255, 0.1);
            color: var(--primary-color);
        }

        .nav-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 20px;
            background: var(--primary-color);
            border-radius: 0 2px 2px 0;
        }

        .download-section {
            padding: 20px 25px 0;
            border-top: 1px solid var(--border-color);
            margin-top: auto;
        }

        .download-btn {
            display: block;
            width: 100%;
            padding: 14px;
            background: rgba(74, 111, 255, 0.1);
            color: var(--primary-color);
            text-align: center;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 1px solid rgba(74, 111, 255, 0.2);
            font-size: 0.9rem;
            position: relative;
            overflow: hidden;
        }

        .download-btn:hover {
            background: rgba(74, 111, 255, 0.15);
            border-color: rgba(74, 111, 255, 0.4);
        }

        .download-btn i {
            margin-right: 8px;
        }

        /* 右侧内容区域样式 */
        .content {
            flex: 1;
            margin-left: 280px;
            height: 100vh;
            overflow-y: auto;
            padding: 40px;
            background: var(--bg-dark);
        }

        .section {
            margin-bottom: 70px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.5s forwards;
            position: relative;
            z-index: 1;
            max-width: 100%;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .section-title {
            font-size: 2rem;
            margin-bottom: 25px;
            color: var(--text-primary);
            font-weight: 600;
            position: relative;
            padding-bottom: 12px;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 50px;
            height: 3px;
            background: var(--primary-color);
            border-radius: 2px;
        }

        .section-content {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 30px;
            border: 1px solid var(--border-color);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .section-content:hover {
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
        }

        /* 视频对比样式 */
        .video-comparison-container {
            margin: 30px 0;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .video-comparison-header {
            display: flex;
            background: rgba(40, 40, 40, 0.7);
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .video-title {
            flex: 1;
            text-align: center;
            font-weight: 600;
            color: var(--text-primary);
        }

        .video-title.before {
            color: #ff6b6b;
        }

        .video-title.after {
            color: #51cf66;
        }

        .video-comparison-content {
            display: flex;
            position: relative;
        }

        .video-wrapper {
            flex: 1;
            position: relative;
        }

        .video-wrapper video {
            width: 100%;
            height: auto;
            display: block;
        }

        .video-controls {
            position: absolute;
            bottom: 15px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 10px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .video-comparison-content:hover .video-controls {
            opacity: 1;
        }

        .control-btn {
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border: none;
            border-radius: 4px;
            padding: 8px 15px;
            cursor: pointer;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: background 0.3s ease;
        }

        .control-btn:hover {
            background: rgba(0, 0, 0, 0.9);
        }

        .control-btn.primary {
            background: rgba(74, 111, 255, 0.8);
        }

        .control-btn.primary:hover {
            background: rgba(74, 111, 255, 1);
        }

        .video-indicator {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 500;
        }

        .audio-controls {
            position: absolute;
            bottom: 60px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 10px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .video-comparison-content:hover .audio-controls {
            opacity: 1;
        }

        .audio-btn {
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border: none;
            border-radius: 4px;
            padding: 8px 15px;
            cursor: pointer;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: background 0.3s ease;
        }

        .audio-btn:hover {
            background: rgba(0, 0, 0, 0.9);
        }

        .audio-btn.muted {
            background: rgba(255, 0, 0, 0.3);
        }

        .audio-status {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 500;
        }

        .audio-status.muted {
            background: rgba(255, 0, 0, 0.5);
        }

        .sync-controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
        }

        .sync-controls .control-btn {
            background: rgba(74, 111, 255, 0.8);
        }

        .sync-controls .control-btn:hover {
            background: rgba(74, 111, 255, 1);
        }

        /* 其他样式保持不变 */
        .image-container {
            margin: 25px 0;
            text-align: center;
            border-radius: 8px;
            overflow: hidden;
            position: relative;

        .image-container img {

            border-radius: 6px;
            transition: transform 0.5s ease;

        }

        .image-caption {
            margin-top: 12px;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 25px;
        }

        .feature-card {
            background: rgba(40, 40, 40, 0.5);
            padding: 22px;
            border-radius: 8px;
            transition: transform 0.3s ease, background 0.3s ease;
            border: 1px solid var(--border-color);
        }

        .feature-card:hover {
            transform: translateY(-5px);
            background: rgba(50, 50, 50, 0.5);
        }

        .feature-card h3 {
            color: var(--primary-color);
            margin-bottom: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
        }

        .feature-card h3 i {
            margin-right: 8px;
            font-size: 0.9rem;
        }

        .step-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            counter-reset: step-counter;
            list-style-type: none;
        }

        .step-list li {
            position: relative;
            padding: 25px 20px 25px 75px;
            background: rgba(40, 40, 40, 0.5);
            border-radius: 8px;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            min-height: 120px;
        }

        .step-list li::before {
            counter-increment: step-counter;
            content: counter(step-counter);
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 36px;
            height: 36px;
            background: var(--primary-color);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1rem;
        }

        .step-list li:hover {
            background: rgba(50, 50, 50, 0.7);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .ai-badge {
            display: inline-block;
            background: rgba(0, 212, 255, 0.1);
            color: var(--accent-color);
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 12px;
            margin-left: 8px;
            font-weight: 500;
        }

        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            font-size: 1.2rem;
            color: var(--text-secondary);
        }

        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #444;
        }

        /* 响应式设计 */
        @media (max-width: 1024px) {
            .sidebar {
                width: 240px;
            }

            .content {
                margin-left: 240px;
                padding: 30px;
            }

            .step-list {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
            }

            .content {
                margin-left: 0;
                padding: 20px;
            }

            body {
                flex-direction: column;
            }

            .feature-grid {
                grid-template-columns: 1fr;
            }

            .step-list {
                grid-template-columns: 1fr;
            }

            .video-comparison-content {
                flex-direction: column;
            }
        }
    </style>
</head>

                                    "url": "https://images.unsplash.com/photo-1677442136019-21780ecad995?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80",
                                    "caption": "AI功能面板 - 智能化编辑体验"

                        {

                            "title": "导出与分享",
                            "icon": "fas fa-share-square",
                            "content": [
                                {

                                    "value": "完成编辑后，ProCut提供多种导出选项，满足不同平台和设备的需求。"

                                    "items": [
                                        "选择导出格式：MP4、MOV、AVI等",
                                        "设置分辨率：从480p到8K超高清",
                                        "调整比特率和帧率，平衡文件大小和质量",
                                        "添加元数据：标题、描述和标签",
                                        "选择导出位置，开始渲染过程",

                                    "url": "https://images.unsplash.com/photo-1611605698335-8b1569810432?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80",
                                    "caption": "导出设置 - 优化视频质量和文件大小"
                                }
                            ]
                        }
                    ]
                }

        };

        // 初始化页面
        document.addEventListener('DOMContentLoaded', function() {
            // 设置当前语言
            let currentLang = 'zh';

            // 初始化页面
            renderPage(currentLang);

            // 设置事件监听器
            setupEventListeners(currentLang);

            // 默认激活第一个导航项
            document.querySelector('.nav-item').classList.add('active');
        });

        // 渲染页面
        function renderPage(lang) {
            const langData = pageData.language[lang];

            // 更新Logo
            document.querySelector('.logo-text h1').textContent = langData.logo.title;
            document.querySelector('.logo-text p').textContent = langData.logo.subtitle;

            // 更新下载按钮
            document.getElementById('download-btn').innerHTML = `<i class="fas fa-download"></i> ${langData.download}`;

            // 更新语言切换器
            document.querySelectorAll('.lang-link').forEach(link => {
                if (link.getAttribute('data-lang') === lang) {
                    link.classList.add('active');
                } else {
                    link.classList.remove('active');
                }
            });

            // 渲染导航和内容
            renderNavigation(langData);
            renderContent(langData);

            // 初始化视频观察器
            initVideoObservers();
        }

        // 渲染导航
        function renderNavigation(langData) {
            const navContainer = document.getElementById('nav-container');
            let navHTML = '';

            langData.sections.forEach(section => {
                navHTML += `
                    <div class="nav-item" data-target="${section.id}">
                        <i class="${section.icon}"></i>
                        <span>${section.title}</span>
                    </div>
                `;
            });

            navContainer.innerHTML = navHTML;
        }

        // 渲染内容
        function renderContent(langData) {
            const contentContainer = document.getElementById('content-container');
            let contentHTML = '';

            langData.sections.forEach(section => {
                contentHTML += `
                    <div class="section" id="${section.id}">
                        <h2 class="section-title">${section.title}</h2>
                        <div class="section-content">
                            ${renderSectionContent(section.content)}
                        </div>
                    </div>
                `;
            });

            contentContainer.innerHTML = contentHTML;
        }

        // 渲染各部分内容
        function renderSectionContent(content) {
            let html = '';

            content.forEach(item => {
                switch(item.type) {
                    case 'text':
                        html += `<p>${item.value}</p>`;
                        break;
                    case 'image':
                        html += `
                            <div class="image-container">
                                <img src="${item.url}" alt="${item.caption}">
                                <div class="image-caption">${item.caption}</div>
                            </div>
                        `;
                        break;
                    case 'grid':
                        html += `<div class="feature-grid">`;
                        item.items.forEach(feature => {
                            const aiBadge = feature.ai ? '<span class="ai-badge">AI</span>' : '';
                            html += `
                                <div class="feature-card">
                                    <h3><i class="${feature.icon}"></i> ${feature.title}${aiBadge}</h3>
                                    <p>${feature.text}</p>
                                </div>
                            `;
                        });
                        html += `</div>`;
                        break;
                    case 'steps':
                        html += `<ol class="step-list">`;
                        item.items.forEach(step => {
                            html += `<li>${step}</li>`;
                        });
                        html += `</ol>`;
                        break;
                    case 'video-comparison':
                        html += `
                            <div class="video-comparison-container">
                                <div class="video-comparison-header">
                                    <div class="video-title before">${item.before.title}</div>
                                    <div class="video-title after">${item.after.title}</div>
                                </div>
                                <div class="video-comparison-content">
                                    <div class="video-wrapper">
                                        <video muted loop playsinline data-src="${item.before.src}">
                                            您的浏览器不支持视频播放
                                        </video>
                                        <div class="video-indicator">${item.before.title}</div>
                                        <div class="audio-status muted" data-video="before">
                                            <i class="fas fa-volume-mute"></i> 静音
                                        </div>
                                        <div class="audio-controls">
                                            <button class="audio-btn muted" data-video="before" data-action="toggle-mute">
                                                <i class="fas fa-volume-mute"></i> 取消静音
                                            </button>
                                        </div>
                                        <div class="video-controls">
                                            <button class="control-btn play-pause-btn" data-video="before">
                                                <i class="fas fa-play"></i> 播放
                                            </button>
                                        </div>
                                    </div>
                                    <div class="video-wrapper">
                                        <video muted loop playsinline data-src="${item.after.src}">
                                            您的浏览器不支持视频播放
                                        </video>
                                        <div class="video-indicator">${item.after.title}</div>
                                        <div class="audio-status muted" data-video="after">
                                            <i class="fas fa-volume-mute"></i> 静音
                                        </div>
                                        <div class="audio-controls">
                                            <button class="audio-btn muted" data-video="after" data-action="toggle-mute">
                                                <i class="fas fa-volume-mute"></i> 取消静音
                                            </button>
                                        </div>
                                        <div class="video-controls">
                                            <button class="control-btn play-pause-btn" data-video="after">
                                                <i class="fas fa-play"></i> 播放
                                            </button>
                                        </div>
                                    </div>
                                </div>
                                <div class="sync-controls">
                                    <button class="control-btn primary" data-action="sync-play">
                                        <i class="fas fa-play-circle"></i> 同步播放
                                    </button>
                                    <button class="control-btn primary" data-action="sync-pause">
                                        <i class="fas fa-pause-circle"></i> 同步暂停
                                    </button>
                                    <button class="control-btn" data-action="sync-reset">
                                        <i class="fas fa-redo"></i> 重置
                                    </button>
                                </div>
                            </div>
                        `;
                        break;
                }
            });

            return html;
        }

        // 初始化视频观察器
        function initVideoObservers() {
            const videoContainers = document.querySelectorAll('.video-comparison-container');

            videoContainers.forEach(container => {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            // 进入可视区域，开始播放
                            playVideosInContainer(container);
                        } else {
                            // 离开可视区域，暂停播放
                            pauseVideosInContainer(container);
                        }
                    });
                }, {
                    threshold: 0.5 // 当50%进入可视区域时触发
                });

                observer.observe(container);
            });

            // 初始化视频控制按钮
            initVideoControls();
        }

        // 播放容器内的所有视频
        function playVideosInContainer(container) {
            const videos = container.querySelectorAll('video');
            videos.forEach(video => {
                // 如果视频尚未加载，先设置src
                if (!video.src && video.dataset.src) {
                    video.src = video.dataset.src;
                }

                video.play().catch(e => {
                    console.log('视频自动播放被阻止:', e);
                });
            });

            // 更新播放/暂停按钮状态
            updatePlayPauseButtons(container, true);
        }

        // 暂停容器内的所有视频
        function pauseVideosInContainer(container) {
            const videos = container.querySelectorAll('video');
            videos.forEach(video => {
                video.pause();
            });

            // 更新播放/暂停按钮状态
            updatePlayPauseButtons(container, false);
        }

        // 更新播放/暂停按钮状态
        function updatePlayPauseButtons(container, isPlaying) {
            const buttons = container.querySelectorAll('.play-pause-btn');
            buttons.forEach(button => {
                if (isPlaying) {
                    button.innerHTML = '<i class="fas fa-pause"></i> 暂停';
                } else {
                    button.innerHTML = '<i class="fas fa-play"></i> 播放';
                }
            });
        }

        // 初始化视频控制按钮
        function initVideoControls() {
            document.addEventListener('click', function(e) {
                if (e.target.closest('.play-pause-btn')) {
                    const button = e.target.closest('.play-pause-btn');
                    const container = button.closest('.video-comparison-container');
                    const videos = container.querySelectorAll('video');

                    // 检查第一个视频的状态
                    const firstVideo = videos[0];

                    if (firstVideo.paused) {
                        // 如果视频是暂停状态，播放所有视频
                        syncPlayVideos(container);
                    } else {
                        // 如果视频是播放状态，暂停所有视频
                        syncPauseVideos(container);
                    }
                }

                if (e.target.closest('.control-btn')) {
                    const button = e.target.closest('.control-btn');
                    const action = button.dataset.action;
                    const container = button.closest('.video-comparison-container');

                    if (action === 'sync-play') {
                        // 同步播放
                        syncPlayVideos(container);
                    } else if (action === 'sync-pause') {
                        // 同步暂停
                        syncPauseVideos(container);
                    } else if (action === 'sync-reset') {
                        // 重置视频
                        syncResetVideos(container);
                    }
                }

                // 音频控制按钮点击事件
                if (e.target.closest('.audio-btn')) {
                    const button = e.target.closest('.audio-btn');
                    const videoType = button.dataset.video;
                    const container = button.closest('.video-comparison-container');
                    const video = container.querySelector(`.video-wrapper:${videoType === 'before' ? 'first-child' : 'last-child'} video`);
                    const audioStatus = container.querySelector(`.audio-status[data-video="${videoType}"]`);

                    // 切换静音状态
                    video.muted = !video.muted;

                    // 更新按钮和状态指示器
                    if (video.muted) {
                        button.classList.add('muted');
                        button.innerHTML = '<i class="fas fa-volume-mute"></i> 取消静音';
                        audioStatus.classList.add('muted');
                        audioStatus.innerHTML = '<i class="fas fa-volume-mute"></i> 静音';
                    } else {
                        button.classList.remove('muted');
                        button.innerHTML = '<i class="fas fa-volume-up"></i> 静音';
                        audioStatus.classList.remove('muted');
                        audioStatus.innerHTML = '<i class="fas fa-volume-up"></i> 有声';
                    }
                }
            });

            // 设置视频同步
            setupVideoSync();
        }

        // 设置视频同步
        function setupVideoSync() {
            const videoContainers = document.querySelectorAll('.video-comparison-container');

            videoContainers.forEach(container => {
                const videos = container.querySelectorAll('video');

                // 为每个视频添加时间更新监听器
                videos.forEach(video => {
                    video.addEventListener('timeupdate', function() {
                        // 如果时间差超过0.1秒，则同步其他视频
                        videos.forEach(otherVideo => {
                            if (otherVideo !== video && Math.abs(otherVideo.currentTime - video.currentTime) > 0.1) {
                                otherVideo.currentTime = video.currentTime;
                            }
                        });
                    });

                    // 监听播放状态变化
                    video.addEventListener('play', function() {
                        updatePlayPauseButtons(container, true);
                    });

                    video.addEventListener('pause', function() {
                        updatePlayPauseButtons(container, false);
                    });
                });
            });
        }

        // 同步播放所有视频
        function syncPlayVideos(container) {
            const videos = container.querySelectorAll('video');
            const playPromises = [];

            videos.forEach(video => {
                // 如果视频尚未加载，先设置src
                if (!video.src && video.dataset.src) {
                    video.src = video.dataset.src;
                }

                playPromises.push(video.play());
            });

            // 等待所有视频开始播放
            Promise.all(playPromises).then(() => {
                updatePlayPauseButtons(container, true);
            }).catch(e => {
                console.log('部分视频播放失败:', e);
            });
        }

        // 同步暂停所有视频
        function syncPauseVideos(container) {
            const videos = container.querySelectorAll('video');
            videos.forEach(video => {
                video.pause();
            });

            updatePlayPauseButtons(container, false);
        }

        // 同步重置所有视频
        function syncResetVideos(container) {
            const videos = container.querySelectorAll('video');
            videos.forEach(video => {
                video.pause();
                video.currentTime = 0;
            });

            updatePlayPauseButtons(container, false);
        }

        // 设置事件监听器
        function setupEventListeners(currentLang) {
            // 导航点击事件
            document.addEventListener('click', function(e) {
                if (e.target.closest('.nav-item')) {
                    const navItem = e.target.closest('.nav-item');
                    const targetId = navItem.getAttribute('data-target');

                    // 更新活动状态
                    document.querySelectorAll('.nav-item').forEach(nav => {
                        nav.classList.remove('active');
                    });
                    navItem.classList.add('active');

                    // 滚动到对应部分
                    const targetSection = document.getElementById(targetId);
                    targetSection.scrollIntoView({
                        behavior: 'smooth',
                        block: 'start'
                    });
                }

                // 语言切换
                if (e.target.classList.contains('lang-link')) {
                    e.preventDefault();
                    const lang = e.target.getAttribute('data-lang');

                    // 重新渲染页面
                    renderPage(lang);

                    // 重新设置事件监听器
                    setupEventListeners(lang);
                }
            });

            // 内容区域滚动时更新导航活动状态
            const contentContainer = document.getElementById('content-container');
            const navItems = document.querySelectorAll('.nav-item');

            contentContainer.addEventListener('scroll', function() {
                const scrollPos = contentContainer.scrollTop + 100;

                // 查找当前可见的部分
                let currentSection = '';
                const sections = pageData.language[currentLang].sections;
                sections.forEach(section => {
                    const sectionEl = document.getElementById(section.id);
                    if (sectionEl && sectionEl.offsetTop <= scrollPos) {
                        currentSection = section.id;
                    }
                });

                // 更新导航活动状态
                navItems.forEach(item => {
                    item.classList.remove('active');
                    if (item.getAttribute('data-target') === currentSection) {
                        item.classList.add('active');
                    }
                });
            });

            // 下载按钮点击事件
            document.getElementById('download-btn').addEventListener('click', function(e) {
                e.preventDefault();
                alert('开始下载ProCut安装程序...');
                // 在实际应用中，这里应该触发文件下载
            });
        }
    </script>
